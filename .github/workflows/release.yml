name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and package
    outputs:
      prerelease: ${{ steps.release_metadata.outputs.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14.2"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --all-groups --frozen

      - name: Verify tag, repository root, and release environment
        if: github.ref_type == 'tag'
        run: uv run python -m scripts.release check "${GITHUB_REF_NAME}"

      - name: Verify repository root and release environment
        if: github.ref_type != 'tag'
        run: uv run python -m scripts.release check

      - name: Classify release
        if: github.ref_type == 'tag'
        id: release_metadata
        run: >-
          uv run python -m scripts.release classify "${GITHUB_REF_NAME}"
          >> "${GITHUB_OUTPUT}"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: BasedPyright
        run: uv run basedpyright

      - name: Pytest with coverage
        run: >-
          uv run pytest --cov=custom_components.geofence_journal
          --cov-branch --cov-fail-under=95 -q

      - name: Build deterministic release archive
        run: uv run python -m scripts.release build dist

      - name: Upload verified release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: geofence-journal-release
          path: dist/geofence_journal.zip
          if-no-files-found: error
          retention-days: 7

  validate-hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: HACS validation
        uses: docker://ghcr.io/hacs/action@sha256:3b5eaf821de267ede11dfdd3a792679dfdc72f52bdaf395422b39f0cfad27120
        env:
          INPUT_CATEGORY: integration
          INPUT_COMMENT: "false"
          INPUT_GITHUB_TOKEN: ${{ github.token }}
          INPUT_IGNORE: brands
          INPUT_REPOSITORY: ${{ github.repository }}

  validate-hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Hassfest validation
        run: >-
          docker run --rm
          --volume "${GITHUB_WORKSPACE}:/github/workspace"
          ghcr.io/home-assistant/hassfest@sha256:5fc3c5d7df109d248a61acfb0a675b38b1e4dc3a202feb260a8e33696f9803e3

  publish:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - verify
      - validate-hacs
      - validate-hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download verified release archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: geofence-journal-release
          path: dist

      - name: Publish immutable tag release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PRERELEASE: ${{ needs.verify.outputs.prerelease }}
        run: |
          if [[ "${PRERELEASE}" == "true" ]]; then
            gh release create "${GITHUB_REF_NAME}" dist/geofence_journal.zip \
              --verify-tag --generate-notes --title "${GITHUB_REF_NAME}" \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" dist/geofence_journal.zip \
              --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
          fi
