name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify and package
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.14.2"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked dependencies
        run: uv sync --all-groups --frozen

      - name: Verify tag, repository root, and release environment
        if: github.ref_type == 'tag'
        run: uv run python -m scripts.release check "${GITHUB_REF_NAME}"

      - name: Verify repository root and release environment
        if: github.ref_type != 'tag'
        run: uv run python -m scripts.release check

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: BasedPyright
        run: uv run basedpyright

      - name: Pytest with coverage
        run: >-
          uv run pytest --cov=custom_components.geofence_journal
          --cov-fail-under=95 -q

      - name: Build deterministic release archive
        run: uv run python -m scripts.release build dist

      - name: Upload verified release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: geofence-journal-release
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 7

  validate-hacs:
    name: HACS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: "integration"
          ignore: "brands"

  validate-hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c

  publish:
    name: Publish GitHub release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - verify
      - validate-hacs
      - validate-hassfest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Download verified release archive
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: geofence-journal-release
          path: dist

      - name: Publish immutable tag release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: >-
          gh release create "${GITHUB_REF_NAME}" dist/*.zip
          --verify-tag --generate-notes --title "${GITHUB_REF_NAME}"
